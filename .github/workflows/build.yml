name: Build and Test

on: [push]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4.1.7
      with:
        persist-credentials: false
    - uses: actions/setup-python@v5.1.1
      with:
        python-version: '3.14'
    - name: Install dependencies
      run: |
        pip install -e ".[dev]"
    - name: Run Makefile
      run: make check
